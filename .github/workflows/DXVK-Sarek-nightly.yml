name: Build DXVK-Sarek Combined

on:
  schedule:
    - cron: '14 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-standard:
    name: Build DXVK-Sarek (Standard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DXVK-Sarek
        uses: actions/checkout@v4
        with:
          repository: pythonlover02/DXVK-Sarek
          ref: main
          path: dxvk
          submodules: recursive
          fetch-depth: 0

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dxvk
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            if gh release list --repo ${{ github.repository }} --limit 100 | grep -q "dxvk-sarek-nightly-$COMMIT_HASH"; then
              echo "SHOULD_BUILD=false" >> $GITHUB_ENV
            else
              echo "SHOULD_BUILD=true" >> $GITHUB_ENV
            fi
          fi

      - name: Generate Version Info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dxvk
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "LATEST_TAG=${LATEST_TAG}" >> $GITHUB_ENV
          echo "VERSION_NAME=${LATEST_TAG}-${COMMIT_HASH}" >> $GITHUB_ENV

      - name: Install Dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build mingw-w64 glslang-tools wine ccache

      - name: Setup ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-dxvk-sarek-standard-${{ env.UPSTREAM_HASH }}
          restore-keys: |
            ccache-dxvk-sarek-standard-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Build DXVK-Sarek
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dxvk
          ./package-release.sh sarek ../dxvk-built --no-package

      - name: Show ccache stats
        if: env.SHOULD_BUILD == 'true'
        run: ccache -s

      - name: Prepare Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p packaging/system32 packaging/syswow64
          cp dxvk-built/dxvk-sarek/x64/*.dll packaging/system32/
          cp dxvk-built/dxvk-sarek/x32/*.dll packaging/syswow64/

          cat <<EOF > packaging/profile.json
          {
            "type": "DXVK",
            "versionName": "${{ env.LATEST_TAG }}-sarek-async-${{ env.COMMIT_HASH }}",
            "versionCode": 0,
            "description": "DXVK-Sarek ${{ env.LATEST_TAG }} ${{ env.COMMIT_HASH }}",
            "author": "Xnick417x",
            "files": [
              {
                "source": "system32/d3d8.dll",
                "target": "\${system32}/d3d8.dll"
              },
              {
                "source": "system32/d3d9.dll",
                "target": "\${system32}/d3d9.dll"
              },
              {
                "source": "system32/d3d10core.dll",
                "target": "\${system32}/d3d10core.dll"
              },
              {
                "source": "system32/d3d11.dll",
                "target": "\${system32}/d3d11.dll"
              },
              {
                "source": "system32/dxgi.dll",
                "target": "\${system32}/dxgi.dll"
              },
              {
                "source": "syswow64/d3d8.dll",
                "target": "\${syswow64}/d3d8.dll"
              },
              {
                "source": "syswow64/d3d9.dll",
                "target": "\${syswow64}/d3d9.dll"
              },
              {
                "source": "syswow64/d3d10core.dll",
                "target": "\${syswow64}/d3d10core.dll"
              },
              {
                "source": "syswow64/d3d11.dll",
                "target": "\${syswow64}/d3d11.dll"
              },
              {
                "source": "syswow64/dxgi.dll",
                "target": "\${syswow64}/dxgi.dll"
              },
            ]
          }
          EOF

      - name: Create Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd packaging
          tar -cJf ../Dxvk-Sarek-${{ env.VERSION_NAME }}.wcp *

      - name: Upload Artifact
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-Sarek-${{ env.COMMIT_HASH }}
          path: Dxvk-Sarek-${{ env.VERSION_NAME }}.wcp

      - name: Create Release
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dxvk-sarek-nightly-${{ env.COMMIT_HASH }}
          files: '*.wcp'
          name: "DXVK-Sarek Nightly ${{ env.VERSION_NAME }}"
          body: |
            Automated nightly build of DXVK-Sarek (Standard).
            Commit: https://github.com/pythonlover02/DXVK-Sarek/commit/${{ env.COMMIT_HASH }}

      - name: Cleanup Old Releases
        if: env.SHOULD_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASES=$(gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("dxvk-sarek-nightly-"))] | sort_by(.createdAt) | reverse | .[].tagName' | tail -n +17)

          for TAG in $OLD_RELEASES; do
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y || true
            sleep 2
          done

      - name: Checkout Dashboard
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          path: dashboard
          fetch-depth: 0

      - name: Update Dashboard (Standard)
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/dxvk-sarek-nightly-${{ env.COMMIT_HASH }}/Dxvk-Sarek-${{ env.VERSION_NAME }}.wcp"
          BRANCH_NAME="${{ github.ref_name }}"

          git checkout $BRANCH_NAME 2>/dev/null || git checkout -b $BRANCH_NAME

          n=0
          until [ "$n" -ge 5 ]
          do
             git pull origin $BRANCH_NAME --rebase
             sed -i "/\*\*DXVK-Sarek\*\* (Standard)/ s|\[\*\*Download Latest\*\*\]([^)]*)|[**Download Latest**]($DOWNLOAD_URL)|" README.md
             git add README.md
             git commit -m "Update dashboard for DXVK-Sarek Standard ${{ env.VERSION_NAME }} [skip ci]" || echo "Nothing to commit"
             if git push origin $BRANCH_NAME; then exit 0; fi
             n=$((n+1))
             sleep 15
          done
          exit 1

  build-arm64ec:
    name: Build DXVK-Sarek (ARM64EC)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout DXVK-Sarek
        uses: actions/checkout@v4
        with:
          repository: pythonlover02/DXVK-Sarek
          ref: main
          path: dxvk
          submodules: recursive
          fetch-depth: 0

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dxvk
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            if gh release list --repo ${{ github.repository }} --limit 100 | grep -q "dxvk-sarek-arm64ec-nightly-$COMMIT_HASH"; then
              echo "SHOULD_BUILD=false" >> $GITHUB_ENV
            else
              echo "SHOULD_BUILD=true" >> $GITHUB_ENV
            fi
          fi

      - name: Generate Version Info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dxvk
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "LATEST_TAG=${LATEST_TAG}" >> $GITHUB_ENV
          echo "VERSION_NAME=${LATEST_TAG}-${COMMIT_HASH}" >> $GITHUB_ENV

      - name: Install Dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates curl xz-utils jq git build-essential \
            python3 pkg-config zstd meson ninja-build wget unzip ccache

      - name: Setup Glslang
        if: env.SHOULD_BUILD == 'true'
        run: |
          wget -q https://github.com/KhronosGroup/glslang/releases/download/master-tot/glslang-master-linux-Release.zip
          unzip -q glslang-master-linux-Release.zip -d glslang
          rm glslang-master-linux-Release.zip

      - name: Add Glslang to Path
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "$PWD/glslang/bin" >> $GITHUB_PATH

      - name: Cache LLVM-MinGW
        if: env.SHOULD_BUILD == 'true'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20251104-ucrt-ubuntu-22.04-x86_64
          key: llvm-mingw-20251104

      - name: Setup LLVM-MinGW
        if: env.SHOULD_BUILD == 'true' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          LLVM_MINGW_TAG="20251104"
          wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/$LLVM_MINGW_TAG/llvm-mingw-$LLVM_MINGW_TAG-ucrt-ubuntu-22.04-x86_64.tar.xz" -O llvm.tar.xz
          tar -xf llvm.tar.xz
          rm llvm.tar.xz

      - name: Add LLVM-MinGW to Path
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "$PWD/llvm-mingw-20251104-ucrt-ubuntu-22.04-x86_64/bin" >> $GITHUB_PATH

      - name: Setup ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-dxvk-sarek-arm64ec-${{ env.UPSTREAM_HASH }}
          restore-keys: |
            ccache-dxvk-sarek-arm64ec-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Configure Cross-Files
        if: env.SHOULD_BUILD == 'true'
        run: |
          cat <<EOF > arm64ec.txt
          [binaries]
          c = 'arm64ec-w64-mingw32-clang'
          cpp = 'arm64ec-w64-mingw32-clang++'
          ar = 'llvm-ar'
          strip = 'llvm-strip'
          windres = 'arm64ec-w64-mingw32-windres'
          widl = 'arm64ec-w64-mingw32-widl'
          pkg-config = 'pkg-config'

          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF

          cat <<EOF > x86.txt
          [binaries]
          c = 'i686-w64-mingw32-clang'
          cpp = 'i686-w64-mingw32-clang++'
          ar = 'llvm-ar'
          strip = 'llvm-strip'
          windres = 'i686-w64-mingw32-windres'
          widl = 'i686-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          EOF

      - name: Build
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dxvk
          meson setup build-ec --cross-file ../arm64ec.txt -Dbuildtype=release -Dstrip=true
          meson setup build-x86 --cross-file ../x86.txt -Dbuildtype=release -Dstrip=true

          ninja -C build-ec -j 2
          ninja -C build-x86 -j 2

      - name: Show ccache stats
        if: env.SHOULD_BUILD == 'true'
        run: ccache -s

      - name: Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p packaging/system32
          mkdir -p packaging/syswow64

          copy_dll() {
            SRC_DIR=$1
            DEST_DIR=$2
            cp "dxvk/$SRC_DIR/src/d3d11/d3d11.dll" "$DEST_DIR/"
            cp "dxvk/$SRC_DIR/src/d3d10/d3d10core.dll" "$DEST_DIR/"
            cp "dxvk/$SRC_DIR/src/d3d9/d3d9.dll" "$DEST_DIR/"
            cp "dxvk/$SRC_DIR/src/d3d8/d3d8.dll" "$DEST_DIR/" || true
            cp "dxvk/$SRC_DIR/src/dxgi/dxgi.dll" "$DEST_DIR/"
          }

          copy_dll "build-ec" "packaging/system32"
          copy_dll "build-x86" "packaging/syswow64"

          llvm-strip --strip-all packaging/system32/*.dll
          llvm-strip --strip-all packaging/syswow64/*.dll

          cp dxvk/build-x86/src/ddraw/ddraw.dll packaging/syswow64/ || true

          cat <<EOF > packaging/profile.json
          {
            "type": "DXVK",
            "versionName": "${{ env.LATEST_TAG }}-sarek-arm64ec-async-${{ env.COMMIT_HASH }}",
            "versionCode": 0,
            "description": "DXVK-Sarek arm64ec ${{ env.LATEST_TAG }} ${{ env.COMMIT_HASH }}",
            "author": "Xnick417x",
            "files": [
              {
                "source": "system32/d3d8.dll",
                "target": "\${system32}/d3d8.dll"
              },
              {
                "source": "system32/d3d9.dll",
                "target": "\${system32}/d3d9.dll"
              },
              {
                "source": "system32/d3d10core.dll",
                "target": "\${system32}/d3d10core.dll"
              },
              {
                "source": "system32/d3d11.dll",
                "target": "\${system32}/d3d11.dll"
              },
              {
                "source": "system32/dxgi.dll",
                "target": "\${system32}/dxgi.dll"
              },
              {
                "source": "syswow64/d3d8.dll",
                "target": "\${syswow64}/d3d8.dll"
              },
              {
                "source": "syswow64/d3d9.dll",
                "target": "\${syswow64}/d3d9.dll"
              },
              {
                "source": "syswow64/d3d10core.dll",
                "target": "\${syswow64}/d3d10core.dll"
              },
              {
                "source": "syswow64/d3d11.dll",
                "target": "\${syswow64}/d3d11.dll"
              },
              {
                "source": "syswow64/dxgi.dll",
                "target": "\${syswow64}/dxgi.dll"
              },
            ]
          }
          EOF

      - name: Create Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd packaging
          tar -cJf ../Dxvk-Sarek-arm64ec-${{ env.VERSION_NAME }}.wcp *

      - name: Upload Artifact
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DXVK-Sarek-ARM64EC-${{ env.COMMIT_HASH }}
          path: Dxvk-Sarek-arm64ec-${{ env.VERSION_NAME }}.wcp

      - name: Create Release (ARM64EC)
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dxvk-sarek-arm64ec-nightly-${{ env.COMMIT_HASH }}
          files: '*.wcp'
          name: "DXVK-Sarek ARM64EC Nightly ${{ env.VERSION_NAME }}"
          body: |
            Automated nightly build of DXVK-Sarek (ARM64EC).
            Commit: https://github.com/pythonlover02/DXVK-Sarek/commit/${{ env.COMMIT_HASH }}

      - name: Cleanup Old Releases (ARM64EC)
        if: env.SHOULD_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASES=$(gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("dxvk-sarek-arm64ec-nightly-"))] | sort_by(.createdAt) | reverse | .[].tagName' | tail -n +17)

          for TAG in $OLD_RELEASES; do
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y || true
            sleep 2
          done

      - name: Checkout Dashboard
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          path: dashboard
          fetch-depth: 0

      - name: Push README Updates (ARM64EC)
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/dxvk-sarek-arm64ec-nightly-${{ env.COMMIT_HASH }}/Dxvk-Sarek-arm64ec-${{ env.VERSION_NAME }}.wcp"
          BRANCH_NAME="${{ github.ref_name }}"

          git checkout $BRANCH_NAME 2>/dev/null || git checkout -b $BRANCH_NAME

          n=0
          until [ "$n" -ge 5 ]
          do
             git pull origin $BRANCH_NAME --rebase
             sed -i "/\*\*DXVK-Sarek\*\* (ARM64EC)/ s|\[\*\*Download Latest\*\*\]([^)]*)|[**Download Latest**]($DOWNLOAD_URL)|" README.md
             git add README.md
             git commit -m "Update dashboard for DXVK-Sarek ARM64EC ${{ env.VERSION_NAME }} [skip ci]" || echo "Nothing to commit"
             if git push origin $BRANCH_NAME; then exit 0; fi
             n=$((n+1))
             sleep 15
          done
          exit 1
