name: Build FEXCore - Unix 

# One-shot build of the FEX Wine emulator libs from source, cross-compiled with
# llvm-mingw exactly like the fex-emu PPA does, PLUS the native aarch64 .so unix
# libs (FEX's native aarch64 UnixLib .so). Defaults to the latest commit on main;
# you can override the ref to build a specific tag/branch/SHA. Runs nightly on a
# schedule, and can also be triggered manually with an optional ref override.
on:
  schedule:
    - cron: '14 3 * * *'
  workflow_dispatch:
    inputs:
      fex_ref:
        description: "FEX ref to build: branch, tag, or commit SHA (default: main = latest commit)"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout FEX (ref)
      uses: actions/checkout@v4
      with:
        repository: FEX-Emu/FEX
        ref: ${{ github.event.inputs.fex_ref || 'main' }}
        submodules: recursive
        fetch-depth: 0
        path: src

    - name: Check for Updates
      id: check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd src
        SHORT_HASH=$(git rev-parse --short HEAD)

        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "SHOULD_BUILD=true" >> $GITHUB_ENV
        else
          # Skip if a "fex-unix-...-<hash>" release already exists for this commit.
          # (the fex-unix- prefix keeps this independent of the non-unix nightly.)
          if gh release list --repo ${{ github.repository }} --limit 100 --json tagName --jq '.[].tagName' | grep -q -- "^fex-unix-.*-${SHORT_HASH}$"; then
            echo "SHOULD_BUILD=false" >> $GITHUB_ENV
          else
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          fi
        fi

    - name: Generate version name
      if: env.SHOULD_BUILD == 'true'
      run: |
        set -euo pipefail
        cd src
        # VERSION_NAME = latest FEX release tag base, tracked dynamically
        # (e.g. FEX-2607 -> 2607; when FEX tags 2608 it becomes 2608 on its own).
        # COMMIT_HASH  = FEX's latest checked-out commit (short).
        # These combine as e.g. <version>-<hash> in the wcp name and profile.json.
        VERSION_NAME=$(git describe --tags --abbrev=0 2>/dev/null || true)
        VERSION_NAME="${VERSION_NAME#FEX-}"
        [ -z "$VERSION_NAME" ] && VERSION_NAME="$(git rev-parse --abbrev-ref HEAD)"
        COMMIT_HASH=$(git rev-parse --short HEAD)
        FEX_SHA=$(git rev-parse HEAD)
        echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
        echo "COMMIT_HASH=$COMMIT_HASH" >> "$GITHUB_ENV"
        echo "FEX_SHA=$FEX_SHA" >> "$GITHUB_ENV"
        echo "Building FEXCore for $VERSION_NAME @ $COMMIT_HASH (commit $FEX_SHA)"

    - name: Install dependencies
      if: env.SHOULD_BUILD == 'true'
      run: |
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends \
          ca-certificates curl wget xz-utils jq git zip unzip zstd \
          dos2unix perl tar build-essential python3 python3-pip pkg-config \
          cmake ninja-build meson

    - name: Setup GLSLANG
      if: env.SHOULD_BUILD == 'true'
      run: |
        set -euo pipefail
        wget -q https://github.com/KhronosGroup/glslang/releases/download/master-tot/glslang-master-linux-Release.zip
        unzip -q glslang-master-linux-Release.zip -d glslang
        echo "$PWD/glslang/bin" >> "$GITHUB_PATH"

    - name: Cache llvm-mingw
      if: env.SHOULD_BUILD == 'true'
      id: cache-llvm-mingw
      uses: actions/cache@v4
      with:
        path: /opt/llvm-mingw
        key: llvm-mingw-bylaws-20250920

    - name: Setup toolchain
      if: env.SHOULD_BUILD == 'true' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
      run: |
        set -euo pipefail
        # bylaws/llvm-mingw 20250920 - the exact toolchain the FEX-Emu PPA builds
        # with (clang 21.1.0 from bylaws/llvm-project). Handles arm64ec + libgcc
        # correctly, unlike mstorsjo builds.
        LLVM_MINGW_TAG="20250920"
        TOOLCHAIN_DIR="/opt/llvm-mingw"
        wget -q "https://github.com/bylaws/llvm-mingw/releases/download/$LLVM_MINGW_TAG/llvm-mingw-$LLVM_MINGW_TAG-ucrt-ubuntu-22.04-x86_64.tar.xz" -O llvm.tar.xz
        sudo rm -rf "$TOOLCHAIN_DIR"
        sudo mkdir -p "$TOOLCHAIN_DIR"
        sudo tar -C "$TOOLCHAIN_DIR" --strip-components=1 -xJf llvm.tar.xz
        rm llvm.tar.xz

    - name: Set PATH
      if: env.SHOULD_BUILD == 'true'
      run: echo "/opt/llvm-mingw/bin" >> "$GITHUB_PATH"

    - name: Build wine DLLs (arm64ec + wow64)
      if: env.SHOULD_BUILD == 'true'
      run: |
        set -euo pipefail

        # FEX PPA DLL recipe (matches the fex-emu-wine PPA build flavor):
        #  - Release + CMAKE_C_FLAGS_RELEASE="-O3 -DNDEBUG -g" => DWARF debug info
        #    for the C files only (the PPA's "debug/dwarf" flavor), C++ optimized.
        #  - CXXFLAGS env (single valid flag) instead of -DCMAKE_CXX_FLAGS, so it
        #    doesn't corrupt FEX's `clang ${CMAKE_CXX_FLAGS} -print-libgcc-file-name`
        #    probe (that corruption was the earlier -lgcc failure).
        #  - INSTALL_LIBDIR=/ (PPA HostThunks path); no `ninja install` - the DLLs
        #    are copied straight out of Bin/.
        #  - TUNE_ARCH=generic + TUNE_CPU=generic => generic codegen, portable.
        # Build dirs: build_arm64ec / build_wow64 (PPA convention).
        build_arch() {
          local triple="$1"
          local dest="$2"
          local build_dir
          case "$triple" in
            arm64ec) build_dir="build_arm64ec" ;;
            aarch64) build_dir="build_wow64" ;;
          esac

          cd "$GITHUB_WORKSPACE/src"
          rm -rf "$build_dir" && mkdir "$build_dir" && cd "$build_dir"

          CXXFLAGS="-Wno-deprecated-enum-enum-conversion" \
          cmake -G Ninja -Wno-dev \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS_RELEASE="-O3 -DNDEBUG -g" \
            -DCMAKE_TOOLCHAIN_FILE=../Data/CMake/toolchain_mingw.cmake \
            -DMINGW_TRIPLE="${triple}-w64-mingw32" \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=/ \
            -DENABLE_JEMALLOC_GLIBC_ALLOC=False \
            -DENABLE_LTO=False -DENABLE_ASSERTIONS=False -DBUILD_TESTING=False \
            -DTUNE_ARCH=generic -DTUNE_CPU=generic \
            -DOVERRIDE_VERSION="${VERSION_NAME}" \
            ..
          ninja -j 2

          # PPA recipe does not `ninja install`; copy the DLL straight out of Bin/.
          mkdir -p "$dest"
          case "$triple" in
            arm64ec) cp Bin/libarm64ecfex.dll "$dest/libarm64ecfex.dll" ;;
            aarch64) cp Bin/libwow64fex.dll   "$dest/libwow64fex.dll" ;;
          esac
          cd "$GITHUB_WORKSPACE"
        }

        build_arch "arm64ec" "$GITHUB_WORKSPACE/stage-ec"
        build_arch "aarch64" "$GITHUB_WORKSPACE/stage-wo"

    - name: Cache Android NDK
      if: env.SHOULD_BUILD == 'true'
      id: cache-ndk
      uses: actions/cache@v4
      with:
        path: /opt/android-ndk
        key: android-ndk-r27c

    - name: Setup Android NDK
      if: env.SHOULD_BUILD == 'true' && steps.cache-ndk.outputs.cache-hit != 'true'
      run: |
        set -euo pipefail
        NDK_VER="r27c"
        wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip" -O ndk.zip
        rm -rf /tmp/ndk-x; mkdir -p /tmp/ndk-x
        unzip -q ndk.zip -d /tmp/ndk-x
        sudo rm -rf /opt/android-ndk
        sudo mv "/tmp/ndk-x/android-ndk-${NDK_VER}" /opt/android-ndk
        rm -rf ndk.zip /tmp/ndk-x

    - name: Build unix libs (aarch64 bionic .so)
      if: env.SHOULD_BUILD == 'true'
      run: |
        set -euo pipefail

        # The .so unix libs (added to FEX's Source/Windows/UnixLib) are built for
        # BIONIC with the Android NDK (arm64, API 28) so they load in WinNative's
        # bionic wine - NOT glibc. -g3/-gdwarf-4 keeps full DWARF; -mtune=generic
        # keeps them portable (armv8-a is the NDK arm64 default).
        if [ ! -f src/Source/Windows/UnixLib/FEXUnixLib.cpp ]; then
          echo "::warning::No UnixLib in this checkout (older ref). Building DLL-only wcp."
          echo "HAVE_SO=0" >> "$GITHUB_ENV"
          exit 0
        fi

        NDK="/opt/android-ndk"
        API=28
        CXX="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${API}-clang++"
        "$CXX" --version | head -1

        # FEXUnixLib.cpp calls shm_open/shm_unlink, which bionic does NOT implement.
        # Declare them so it compiles, and leave them as UNDEFINED symbols to be
        # resolved at runtime by the WinNative wine process (--allow-shlib-undefined).
        # No -lrt: bionic folds those into libc.
        cat > /tmp/bionic_shm_decl.h <<'HDR'
        #pragma once
        #include <sys/types.h>
        extern "C" {
        int shm_open(const char* name, int oflag, mode_t mode);
        int shm_unlink(const char* name);
        }
        HDR

        mkdir -p unixlibs
        CXXFLAGS="-shared -fPIC -O2 -std=c++17 -g3 -gdwarf-4 -fno-omit-frame-pointer \
          -fasynchronous-unwind-tables -funwind-tables -mtune=generic \
          -include /tmp/bionic_shm_decl.h \
          -Wl,--allow-shlib-undefined"
        # Same TU for both, named differently (matches FEX's two UnixLib targets).
        for name in libwow64fex libarm64ecfex; do
          "$CXX" $CXXFLAGS -o "unixlibs/${name}.so" src/Source/Windows/UnixLib/FEXUnixLib.cpp
        done

        echo "Built bionic unix libs (shm_open/shm_unlink resolved at runtime by wine):"
        file unixlibs/*.so
        echo "HAVE_SO=1" >> "$GITHUB_ENV"

    - name: Package
      if: env.SHOULD_BUILD == 'true'
      run: |
        set -euo pipefail

        rm -rf final_package
        mkdir -p final_package/system32

        DLL_EC=$(find stage-ec -type f -name 'libarm64ecfex.dll' | head -n1)
        DLL_WOW=$(find stage-wo -type f -name 'libwow64fex.dll' | head -n1)

        if [ -z "$DLL_EC" ] || [ -z "$DLL_WOW" ]; then
          echo "::error::Expected DLLs not produced"
          find stage-ec stage-wo -type f -name '*.dll' || true
          exit 1
        fi

        cp "$DLL_EC"  final_package/system32/libarm64ecfex.dll
        cp "$DLL_WOW" final_package/system32/libwow64fex.dll

        # No strip on purpose: built RelWithDebInfo with -g3 -gdwarf-4, so the DLLs
        # carry full DWARF debug info. The PPA also disables dh_strip for
        # fex-emu-wine (ships symbols), so keeping them unstripped matches the PPA
        # and preserves readable backtraces.

        # Unix .so libs (built in the previous step, if the checkout had UnixLib).
        HAVE_SO="${HAVE_SO:-0}"
        SO_EC=""; SO_WOW=""
        if [ "$HAVE_SO" = "1" ]; then
          SO_EC=$(find unixlibs -type f -name 'libarm64ecfex.so' | head -n1)
          SO_WOW=$(find unixlibs -type f -name 'libwow64fex.so' | head -n1)
        fi

        if [ -n "$SO_EC" ] && [ -n "$SO_WOW" ]; then
          mkdir -p final_package/aarch64-unix
          cp "$SO_EC"  final_package/aarch64-unix/libarm64ecfex.so
          cp "$SO_WOW" final_package/aarch64-unix/libwow64fex.so
          echo "Packaging DLLs + unix .so libs"
        else
          echo "::error::unix .so libs missing - refusing to build a DLL-only wcp"
          exit 1
        fi

        cat > final_package/profile.json <<EOF
        {
          "type": "FEXCore",
          "versionName": "${VERSION_NAME}-${COMMIT_HASH}-unix",
          "versionCode": 0,
          "description": "FEXCore ${VERSION_NAME} ${COMMIT_HASH} +unix libs",
          "files": [
            {
              "source": "aarch64-unix/libarm64ecfex.so",
              "target": "\${libdir}/wine/aarch64-unix/libarm64ecfex.so"
            },
            {
              "source": "aarch64-unix/libwow64fex.so",
              "target": "\${libdir}/wine/aarch64-unix/libwow64fex.so"
            },
            {
              "source": "system32/libarm64ecfex.dll",
              "target": "\${system32}/libarm64ecfex.dll"
            },
            {
              "source": "system32/libwow64fex.dll",
              "target": "\${system32}/libwow64fex.dll"
            }
          ]
        }
        EOF

    - name: Create WCP
      if: env.SHOULD_BUILD == 'true'
      run: |
        cd final_package
        tar -cJf ../FEXCore-${{ env.VERSION_NAME }}-${{ env.COMMIT_HASH }}-unix.wcp .

    - name: Upload Artifact
      if: env.SHOULD_BUILD == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: fexcore-latest
        path: '*.wcp'

    - name: Create Release
      if: env.SHOULD_BUILD == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: fex-unix-${{ env.VERSION_NAME }}-${{ env.COMMIT_HASH }}
        files: '*.wcp'
        name: "FEXCore ${{ env.VERSION_NAME }} ${{ env.COMMIT_HASH }} with unixlibs"
        prerelease: true
        body: |
          FEXCore build from the latest FEX commit: Wine emulator DLLs cross-
          compiled with llvm-mingw, plus the native aarch64 .so unix libs.

          Ref: ${{ github.event.inputs.fex_ref }}
          Commit: https://github.com/FEX-Emu/FEX/commit/${{ env.FEX_SHA }}

    - name: Cleanup Old Releases
      if: env.SHOULD_BUILD == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Keep the 8 newest "fex-unix-" releases; delete older ones. The
        # fex-unix- prefix means this only ever touches unix releases, never the
        # non-unix nightly (fex-nightly-...).
        OLD_RELEASES=$(gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("fex-unix-"))] | sort_by(.createdAt) | reverse | .[].tagName' | tail -n +9)

        for TAG in $OLD_RELEASES; do
          echo "Deleting old release: $TAG"
          gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y || true
          sleep 2
        done

    - name: Update README Dashboard
      if: env.SHOULD_BUILD == 'true'
      uses: actions/checkout@v4
      with:
        path: dashboard
        fetch-depth: 0

    - name: Push README Updates
      if: env.SHOULD_BUILD == 'true'
      run: |
        cd dashboard
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/fex-unix-${{ env.VERSION_NAME }}-${{ env.COMMIT_HASH }}/FEXCore-${{ env.VERSION_NAME }}-${{ env.COMMIT_HASH }}-unix.wcp"
        BRANCH_NAME="${{ github.ref_name }}"

        git checkout $BRANCH_NAME 2>/dev/null || git checkout -b $BRANCH_NAME

        n=0
        until [ "$n" -ge 5 ]
        do
           git pull origin $BRANCH_NAME --rebase
           sed -i "/\*\*FEXCore-Unix\*\* (ARM64EC)/ s|\[\*\*Download Latest\*\*\]([^)]*)|[**Download Latest**]($DOWNLOAD_URL)|" README.md
           git add README.md
           git commit -m "Update dashboard for FEXCore-Unix ${{ env.VERSION_NAME }}-${{ env.COMMIT_HASH }} [skip ci]" || echo "Nothing to commit"
           if git push origin $BRANCH_NAME; then exit 0; fi
           n=$((n+1))
           sleep 15
        done
        exit 1
