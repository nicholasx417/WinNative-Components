name: Build D7VK Combined

on:
  schedule:
    - cron: '14 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-standard:
    name: Build D7VK (Standard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout D7VK
        uses: actions/checkout@v4
        with:
          repository: WinterSnowfall/d7vk
          ref: devel
          path: d7vk
          submodules: recursive
          fetch-depth: 0

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd d7vk
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            if gh release list --repo ${{ github.repository }} --limit 100 | grep -q "d7vk-nightly-$COMMIT_HASH"; then
              echo "SHOULD_BUILD=false" >> $GITHUB_ENV
            else
              echo "SHOULD_BUILD=true" >> $GITHUB_ENV
            fi
          fi

      - name: Generate Version Info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd d7vk
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//;s/_WIP//')
          echo "LATEST_TAG=${LATEST_TAG}" >> $GITHUB_ENV
          echo "VERSION_NAME=${LATEST_TAG}-${COMMIT_HASH}" >> $GITHUB_ENV

      - name: Install Dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build mingw-w64 glslang-tools wine ccache

      - name: Setup ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-d7vk-standard-${{ env.UPSTREAM_HASH }}
          restore-keys: |
            ccache-d7vk-standard-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Build D7VK
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd d7vk
          meson setup build-w64 --cross-file build-win64.txt -Dbuildtype=release -Dstrip=true
          meson setup build-w32 --cross-file build-win32.txt -Dbuildtype=release -Dstrip=true

          ninja -C build-w64 -j 2
          ninja -C build-w32 -j 2

      - name: Show ccache stats
        if: env.SHOULD_BUILD == 'true'
        run: ccache -s

      - name: Prepare Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p packaging/syswow64

          # Copy only the compiled 32-bit ddraw.dll directly from the meson output
          cp d7vk/build-w32/src/ddraw/ddraw.dll packaging/syswow64/ddraw.dll || true

          cat <<EOF > packaging/profile.json
          {
            "type": "D7VK",
            "versionName": "${{ env.LATEST_TAG }}-${{ env.COMMIT_HASH }}",
            "versionCode": 0,
            "description": "D7VK ${{ env.LATEST_TAG }}-${{ env.COMMIT_HASH }}",
            "author": "Xnick417x",
            "files": [
              {
                "source": "syswow64/ddraw.dll",
                "target": "\${syswow64}/ddraw.dll"
              }
            ]
          }
          EOF

      - name: Create Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd packaging
          tar -cJf ../D7vk-${{ env.VERSION_NAME }}.wcp *

      - name: Upload Artifact
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: D7VK-${{ env.COMMIT_HASH }}
          path: D7vk-${{ env.VERSION_NAME }}.wcp

      - name: Create Release
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: d7vk-nightly-${{ env.COMMIT_HASH }}
          files: '*.wcp'
          name: "D7VK Nightly ${{ env.VERSION_NAME }}"
          body: |
            Automated nightly build of D7VK (Standard).
            Commit: https://github.com/WinterSnowfall/d7vk/commit/${{ env.COMMIT_HASH }}

      - name: Cleanup Old Releases
        if: env.SHOULD_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASES=$(gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("d7vk-nightly-"))] | sort_by(.createdAt) | reverse | .[].tagName' | tail -n +17)

          for TAG in $OLD_RELEASES; do
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y || true
            sleep 2
          done

      - name: Checkout Dashboard
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          path: dashboard
          fetch-depth: 0

      - name: Update Dashboard (Standard)
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/d7vk-nightly-${{ env.COMMIT_HASH }}/D7vk-${{ env.VERSION_NAME }}.wcp"
          BRANCH_NAME="${{ github.ref_name }}"

          git checkout $BRANCH_NAME 2>/dev/null || git checkout -b $BRANCH_NAME

          n=0
          until [ "$n" -ge 5 ]
          do
             git pull origin $BRANCH_NAME --rebase
             sed -i "/\*\*D7VK\*\* (Standard)/ s|\[\*\*Download Latest\*\*\]([^)]*)|[**Download Latest**]($DOWNLOAD_URL)|" README.md
             git add README.md
             git commit -m "Update dashboard for D7VK Standard ${{ env.VERSION_NAME }} [skip ci]" || echo "Nothing to commit"
             if git push origin $BRANCH_NAME; then exit 0; fi
             n=$((n+1))
             sleep 15
          done
          exit 1

  build-arm64ec:
    name: Build D7VK (ARM64EC)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout D7VK
        uses: actions/checkout@v4
        with:
          repository: WinterSnowfall/d7vk
          ref: devel
          path: d7vk
          submodules: recursive
          fetch-depth: 0

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd d7vk
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            if gh release list --repo ${{ github.repository }} --limit 100 | grep -q "d7vk-arm64ec-nightly-$COMMIT_HASH"; then
              echo "SHOULD_BUILD=false" >> $GITHUB_ENV
            else
              echo "SHOULD_BUILD=true" >> $GITHUB_ENV
            fi
          fi

      - name: Generate Version Info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd d7vk
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//;s/_WIP//')
          echo "LATEST_TAG=${LATEST_TAG}" >> $GITHUB_ENV
          echo "VERSION_NAME=${LATEST_TAG}-arm64ec-${COMMIT_HASH}" >> $GITHUB_ENV

      - name: Install Dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates curl xz-utils jq git build-essential \
            python3 pkg-config zstd meson ninja-build wget unzip ccache

      - name: Setup Glslang
        if: env.SHOULD_BUILD == 'true'
        run: |
          wget -q https://github.com/KhronosGroup/glslang/releases/download/master-tot/glslang-master-linux-Release.zip
          unzip -q glslang-master-linux-Release.zip -d glslang
          rm glslang-master-linux-Release.zip

      - name: Add Glslang to Path
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "$PWD/glslang/bin" >> $GITHUB_PATH

      - name: Cache LLVM-MinGW
        if: env.SHOULD_BUILD == 'true'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: llvm-mingw-20251104-ucrt-ubuntu-22.04-x86_64
          key: llvm-mingw-20251104

      - name: Setup LLVM-MinGW
        if: env.SHOULD_BUILD == 'true' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          LLVM_MINGW_TAG="20251104"
          wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/$LLVM_MINGW_TAG/llvm-mingw-$LLVM_MINGW_TAG-ucrt-ubuntu-22.04-x86_64.tar.xz" -O llvm.tar.xz
          tar -xf llvm.tar.xz
          rm llvm.tar.xz

      - name: Add LLVM-MinGW to Path
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "$PWD/llvm-mingw-20251104-ucrt-ubuntu-22.04-x86_64/bin" >> $GITHUB_PATH

      - name: Setup ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-d7vk-arm64ec-${{ env.UPSTREAM_HASH }}
          restore-keys: |
            ccache-d7vk-arm64ec-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Configure Cross-Files
        if: env.SHOULD_BUILD == 'true'
        run: |
          cat <<EOF > arm64ec.txt
          [binaries]
          c = 'arm64ec-w64-mingw32-clang'
          cpp = 'arm64ec-w64-mingw32-clang++'
          ar = 'llvm-ar'
          strip = 'llvm-strip'
          windres = 'arm64ec-w64-mingw32-windres'
          widl = 'arm64ec-w64-mingw32-widl'
          pkg-config = 'pkg-config'

          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF

          cat <<EOF > x86.txt
          [binaries]
          c = 'i686-w64-mingw32-clang'
          cpp = 'i686-w64-mingw32-clang++'
          ar = 'llvm-ar'
          strip = 'llvm-strip'
          windres = 'i686-w64-mingw32-windres'
          widl = 'i686-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          EOF

      - name: Checkout Patches
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          path: patches
          sparse-checkout: patch

      - name: Apply ARM64EC Patch
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd d7vk
          git apply -v --whitespace=nowarn "$GITHUB_WORKSPACE/patches/patch/d7vk-arm64ec-neon.patch"

      - name: Build
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd d7vk
          meson setup build-ec --cross-file ../arm64ec.txt -Dbuildtype=release -Dstrip=true
          meson setup build-x86 --cross-file ../x86.txt -Dbuildtype=release -Dstrip=true

          ninja -C build-ec -j 2
          ninja -C build-x86 -j 2

      - name: Show ccache stats
        if: env.SHOULD_BUILD == 'true'
        run: ccache -s

      - name: Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p packaging/syswow64

          # Copy only the compiled 32-bit (x86) ddraw.dll
          cp "d7vk/build-x86/src/ddraw/ddraw.dll" "packaging/syswow64/ddraw.dll" || true

          llvm-strip --strip-all packaging/syswow64/*.dll

          cat <<EOF > packaging/profile.json
          {
            "type": "D7VK",
            "versionName": "${{ env.LATEST_TAG }}-arm64ec-${{ env.COMMIT_HASH }}",
            "versionCode": 0,
            "description": "D7VK arm64ec ${{ env.LATEST_TAG }} ARM64EC-${{ env.COMMIT_HASH }}",
            "author": "Xnick417x",
            "files": [
              {
                "source": "syswow64/ddraw.dll",
                "target": "\${syswow64}/ddraw.dll"
              }
            ]
          }
          EOF

      - name: Create Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd packaging
          tar -cJf ../D7vk-${{ env.VERSION_NAME }}.wcp *

      - name: Upload Artifact
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: D7VK-arm64ec-${{ env.COMMIT_HASH }}
          path: D7vk-${{ env.VERSION_NAME }}.wcp

      - name: Create Release (ARM64EC)
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: d7vk-arm64ec-nightly-${{ env.COMMIT_HASH }}
          files: '*.wcp'
          name: "D7VK nightly ${{ env.VERSION_NAME }}"
          body: |
            Automated nightly build of D7VK (ARM64EC).
            Commit: https://github.com/WinterSnowfall/d7vk/commit/${{ env.COMMIT_HASH }}

      - name: Cleanup Old Releases (ARM64EC)
        if: env.SHOULD_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASES=$(gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("d7vk-arm64ec-nightly-"))] | sort_by(.createdAt) | reverse | .[].tagName' | tail -n +17)

          for TAG in $OLD_RELEASES; do
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y || true
            sleep 2
          done

      - name: Checkout Dashboard
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          path: dashboard
          fetch-depth: 0

      - name: Push README Updates (ARM64EC)
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/d7vk-arm64ec-nightly-${{ env.COMMIT_HASH }}/D7vk-${{ env.VERSION_NAME }}.wcp"
          BRANCH_NAME="${{ github.ref_name }}"

          git checkout $BRANCH_NAME 2>/dev/null || git checkout -b $BRANCH_NAME

          n=0
          until [ "$n" -ge 5 ]
          do
             git pull origin $BRANCH_NAME --rebase
             sed -i "/\*\*D7VK\*\* (ARM64EC)/ s|\[\*\*Download Latest\*\*\]([^)]*)|[**Download Latest**]($DOWNLOAD_URL)|" README.md
             git add README.md
             git commit -m "Update dashboard for D7VK ARM64EC ${{ env.VERSION_NAME }} [skip ci]" || echo "Nothing to commit"
             if git push origin $BRANCH_NAME; then exit 0; fi
             n=$((n+1))
             sleep 15
          done
          exit 1
