name: Build Vkd3d Combined

on:
  schedule:
    - cron: '14 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VKD3D
        uses: actions/checkout@v4
        with:
          repository: HansKristian-Work/vkd3d-proton
          submodules: recursive
          fetch-depth: 0
          path: src

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]];
          then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            if gh release list --repo ${{ github.repository }} --limit 100 |
            grep -q -- "-$SHORT_HASH"; then
              echo "SHOULD_BUILD=false" >> $GITHUB_ENV
            else
              echo "SHOULD_BUILD=true" >> $GITHUB_ENV
            fi
          fi

      - name: Install Dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl xz-utils jq git glslang-tools \
            build-essential python3 python3-pip pkg-config \
            meson ninja-build zstd ccache

      - name: Cache llvm-mingw
        if: env.SHOULD_BUILD == 'true'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-bylaws-20250920

      - name: Setup Toolchain (llvm-mingw)
        if: env.SHOULD_BUILD == 'true' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          LLVM_MINGW_TAG="20250920"
          TOOLCHAIN_DIR="/opt/llvm-mingw"
          wget -q "https://github.com/bylaws/llvm-mingw/releases/download/$LLVM_MINGW_TAG/llvm-mingw-$LLVM_MINGW_TAG-ucrt-ubuntu-22.04-x86_64.tar.xz" -O llvm.tar.xz
          sudo rm -rf "$TOOLCHAIN_DIR"
          sudo mkdir -p "$TOOLCHAIN_DIR"
          sudo tar -C "$TOOLCHAIN_DIR" --strip-components=1 -xJf llvm.tar.xz
          rm llvm.tar.xz

      - name: Set PATH
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

      - name: Setup ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-vkd3d-${{ env.UPSTREAM_HASH }}
          restore-keys: |
            ccache-vkd3d-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Generate Version Info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd src
          COMMIT_HASH=$(git rev-parse --short HEAD)
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
          VERSION_NAME="${LATEST_TAG}-${COMMIT_HASH}"
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_ENV
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

      - name: Build
        if: env.SHOULD_BUILD == 'true'
        run: |
          cat <<EOF > cross-x64.txt
          [binaries]
          c = ['ccache', '/opt/llvm-mingw/bin/x86_64-w64-mingw32-clang']
          cpp = ['ccache', '/opt/llvm-mingw/bin/x86_64-w64-mingw32-clang++']
          ar = '/opt/llvm-mingw/bin/llvm-ar'
          strip = '/opt/llvm-mingw/bin/llvm-strip'
          windres = '/opt/llvm-mingw/bin/x86_64-w64-mingw32-windres'
          widl = '/opt/llvm-mingw/bin/x86_64-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          exe_wrapper = ['wine']
          [host_machine]
          system = 'windows'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF

          cat <<EOF > cross-x86.txt
          [binaries]
          c = ['ccache', '/opt/llvm-mingw/bin/i686-w64-mingw32-clang']
          cpp = ['ccache', '/opt/llvm-mingw/bin/i686-w64-mingw32-clang++']
          ar = '/opt/llvm-mingw/bin/llvm-ar'
          strip = '/opt/llvm-mingw/bin/llvm-strip'
          windres = '/opt/llvm-mingw/bin/i686-w64-mingw32-windres'
          widl = '/opt/llvm-mingw/bin/i686-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          exe_wrapper = ['wine']
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          EOF
          
          cd src
          meson setup build-x64 --cross-file ../cross-x64.txt -Dbuildtype=release -Dstrip=true
          ninja -C build-x64
          meson setup build-x86 --cross-file ../cross-x86.txt -Dbuildtype=release -Dstrip=true
          ninja -C build-x86

      - name: Show ccache stats
        if: env.SHOULD_BUILD == 'true'
        run: ccache -s

      - name: Package
        if: env.SHOULD_BUILD == 'true'
        run: |
          rm -rf final_package
          mkdir -p final_package/system32
          mkdir -p final_package/syswow64
          find src/build-x64 -name "d3d12.dll" -exec cp -L {} final_package/system32/ \;
          find src/build-x64 -name "d3d12core.dll" -exec cp -L {} final_package/system32/ \;
          find src/build-x86 -name "d3d12.dll" -exec cp -L {} final_package/syswow64/ \;
          find src/build-x86 -name "d3d12core.dll" -exec cp -L {} final_package/syswow64/ \;
          cat <<EOF > final_package/profile.json
          {
            "type": "VKD3D",
            "versionName": "${{ env.VERSION_NAME }}",
            "versionCode": 0,
            "description": "Vkd3d Nightly ${{ env.COMMIT_HASH }}",
            "files": [
              {
                "source": "system32/d3d12.dll",
                "target": "\${system32}/d3d12.dll"
              },
              {
                "source": "system32/d3d12core.dll",
                "target": "\${system32}/d3d12core.dll"
              },
              {
                "source": "syswow64/d3d12.dll",
                "target": "\${syswow64}/d3d12.dll"
              },
              {
                "source": "syswow64/d3d12core.dll",
                "target": "\${syswow64}/d3d12core.dll"
              }
            ]
          }
          EOF
          cd final_package
          tar -cJf ../Vkd3d-${{ env.VERSION_NAME }}.wcp *

      - name: Upload Artifact
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vkd3d
          path: '*.wcp'

      - name: Create Release
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: vkd3d-nightly-${{ env.COMMIT_HASH }}
          files: '*.wcp'
          name: "Vkd3d Nightly ${{ env.COMMIT_HASH }}"
          body: |
            Automated nightly build of Vkd3d.
            Commit: https://github.com/HansKristian-Work/vkd3d-proton/commit/${{ env.COMMIT_HASH }}

      - name: Cleanup Old Releases
        if: env.SHOULD_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASES=$(gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("vkd3d-nightly-"))] | sort_by(.createdAt) | reverse | .[].tagName' | tail -n +9)
          
          for TAG in $OLD_RELEASES;
          do
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y ||
            true
            sleep 2
          done

      - name: Update Dashboard
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          path: dashboard
          fetch-depth: 0

      - name: Push README Updates
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/vkd3d-nightly-${{ env.COMMIT_HASH }}/Vkd3d-${{ env.VERSION_NAME }}.wcp"
          BRANCH_NAME="${{ github.ref_name }}"
          git checkout $BRANCH_NAME 2>/dev/null ||
          git checkout -b $BRANCH_NAME
          n=0
          until [ "$n" -ge 5 ]
          do
             git pull origin $BRANCH_NAME --rebase
             sed -i "/\*\*VKD3D-Proton\*\* (Standard)/ s|\\[\\*\\*Download Latest\\*\\*\\]([^)]*)|[**Download Latest**]($DOWNLOAD_URL)|" README.md
             git add README.md
             git commit -m "Update dashboard for Vkd3d ${{ env.COMMIT_HASH }} [skip ci]" || echo "Nothing to commit"
             if git push origin $BRANCH_NAME; then exit 0; fi
             n=$((n+1))
             sleep 15
          done
          exit 1

  build-arm64ec:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout VKD3D
        uses: actions/checkout@v4
        with:
          repository: HansKristian-Work/vkd3d-proton
          submodules: recursive
          fetch-depth: 0
          path: src

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]];
          then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            if gh release list --repo ${{ github.repository }} --limit 100 |
            grep -q -- "-$SHORT_HASH"; then
              echo "SHOULD_BUILD=false" >> $GITHUB_ENV
            else
              echo "SHOULD_BUILD=true" >> $GITHUB_ENV
            fi
          fi

      - name: Install Dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl xz-utils jq git python3 pkg-config \
            zstd meson ninja-build wget unzip build-essential ccache

      - name: Cache GLSLang
        if: env.SHOULD_BUILD == 'true'
        id: cache-glslang
        uses: actions/cache@v4
        with:
          path: glslang
          key: glslang-master

      - name: Setup GLSLang
        if: env.SHOULD_BUILD == 'true' && steps.cache-glslang.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/KhronosGroup/glslang/releases/download/master-tot/glslang-master-linux-Release.zip
          unzip -q glslang-master-linux-Release.zip -d glslang
          rm glslang-master-linux-Release.zip

      - name: Add GLSLang to Path
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "$PWD/glslang/bin" >> $GITHUB_PATH

      - name: Cache llvm-mingw
        if: env.SHOULD_BUILD == 'true'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-bylaws-20250920

      - name: Setup Toolchain (llvm-mingw)
        if: env.SHOULD_BUILD == 'true' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          LLVM_MINGW_TAG="20250920"
          TOOLCHAIN_DIR="/opt/llvm-mingw"
          wget -q "https://github.com/bylaws/llvm-mingw/releases/download/$LLVM_MINGW_TAG/llvm-mingw-$LLVM_MINGW_TAG-ucrt-ubuntu-22.04-x86_64.tar.xz" -O llvm.tar.xz
          sudo rm -rf "$TOOLCHAIN_DIR"
          sudo mkdir -p "$TOOLCHAIN_DIR"
          sudo tar -C "$TOOLCHAIN_DIR" --strip-components=1 -xJf llvm.tar.xz
          rm llvm.tar.xz

      - name: Set PATH
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

      - name: Setup ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-vkd3d-arm64ec-${{ env.UPSTREAM_HASH }}
          restore-keys: |
            ccache-vkd3d-arm64ec-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Generate Version Info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd src
          COMMIT_HASH=$(git rev-parse --short HEAD)
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
          VERSION_NAME="${LATEST_TAG}-arm64ec-${COMMIT_HASH}"
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_ENV
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

      - name: Build arm64ec
        if: env.SHOULD_BUILD == 'true'
        run: |
          cat <<EOF > arm64ec.txt
          [binaries]
          c = ['ccache', 'arm64ec-w64-mingw32-clang']
          cpp = ['ccache', 'arm64ec-w64-mingw32-clang++']
          ar = 'llvm-ar'
          strip = 'llvm-strip'
          windres = 'arm64ec-w64-mingw32-windres'
          widl = 'arm64ec-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF

          cat <<EOF > x86.txt
          [binaries]
          c = ['ccache', 'i686-w64-mingw32-clang']
          cpp = ['ccache', 'i686-w64-mingw32-clang++']
          ar = 'llvm-ar'
          strip = 'llvm-strip'
          windres = 'i686-w64-mingw32-windres'
          widl = 'i686-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          EOF

          cd src
          meson setup build-ec --cross-file ../arm64ec.txt -Dbuildtype=release -Dstrip=true
          ninja -C build-ec -j 2
          meson setup build-x86 --cross-file ../x86.txt -Dbuildtype=release -Dstrip=true
          ninja -C build-x86 -j 2

      - name: Show ccache stats
        if: env.SHOULD_BUILD == 'true'
        run: ccache -s

      - name: Package arm64ec
        if: env.SHOULD_BUILD == 'true'
        run: |
          rm -rf final_package
          mkdir -p final_package/system32
          mkdir -p final_package/syswow64
          find src/build-ec -name "d3d12.dll" -exec cp -L {} final_package/system32/ \;
          find src/build-ec -name "d3d12core.dll" -exec cp -L {} final_package/system32/ \;
          find src/build-x86 -name "d3d12.dll" -exec cp -L {} final_package/syswow64/ \;
          find src/build-x86 -name "d3d12core.dll" -exec cp -L {} final_package/syswow64/ \;
          # system32 holds the ARM64EC DLLs - left unstripped so symbols survive.
          # syswow64 is plain x86, stripped as before.
          llvm-strip --strip-all final_package/syswow64/*.dll
          
          cat <<EOF > final_package/profile.json
          {
            "type": "VKD3D",
            "versionName": "${{ env.VERSION_NAME }}",
            "versionCode": 0,
            "description": "Vkd3d arm64ec Nightly ${{ env.COMMIT_HASH }}",
            "files": [
              {
                "source": "system32/d3d12.dll",
                "target": "\${system32}/d3d12.dll"
              },
              {
                "source": "system32/d3d12core.dll",
                "target": "\${system32}/d3d12core.dll"
              },
              {
                "source": "syswow64/d3d12.dll",
                "target": "\${syswow64}/d3d12.dll"
              },
              {
                "source": "syswow64/d3d12core.dll",
                "target": "\${syswow64}/d3d12core.dll"
              }
            ]
          }
          EOF
          cd final_package
          tar -cf ../archive.tar .
          cd ..
          xz -9 archive.tar
          mv archive.tar.xz Vkd3d-${{ env.VERSION_NAME }}.wcp

      - name: Upload Artifact (arm64ec)
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vkd3d-arm64ec
          path: '*.wcp'

      - name: Create Release (arm64ec)
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: vkd3d-arm64ec-nightly-${{ env.COMMIT_HASH }}
          files: '*.wcp'
          name: "Vkd3d arm64ec Nightly ${{ env.COMMIT_HASH }}"
          body: |
            Automated nightly build of Vkd3d (arm64ec).
            Commit: https://github.com/HansKristian-Work/vkd3d-proton/commit/${{ env.COMMIT_HASH }}

      - name: Cleanup Old Releases (arm64ec)
        if: env.SHOULD_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASES=$(gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("vkd3d-arm64ec-nightly-"))] | sort_by(.createdAt) | reverse | .[].tagName' | tail -n +9)
          
          for TAG in $OLD_RELEASES;
          do
            echo "Deleting old release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y ||
            true
            sleep 2
          done

      - name: Update Dashboard (arm64ec)
        if: env.SHOULD_BUILD == 'true'
        uses: actions/checkout@v4
        with:
          path: dashboard
          fetch-depth: 0

      - name: Push README Updates (arm64ec)
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/vkd3d-arm64ec-nightly-${{ env.COMMIT_HASH }}/Vkd3d-${{ env.VERSION_NAME }}.wcp"
          BRANCH_NAME="${{ github.ref_name }}"
          git checkout $BRANCH_NAME 2>/dev/null ||
          git checkout -b $BRANCH_NAME
          n=0
          until [ "$n" -ge 5 ]
          do
             git pull origin $BRANCH_NAME --rebase
             sed -i "/\*\*VKD3D-Proton\*\* (ARM64EC)/ s|\\[\\*\\*Download Latest\\*\\*\\]([^)]*)|[**Download Latest**]($DOWNLOAD_URL)|" README.md
             git add README.md
             git commit -m "Update dashboard for Vkd3d arm64ec ${{ env.COMMIT_HASH }} [skip ci]" || echo "Nothing to commit"
             if git push origin $BRANCH_NAME; then exit 0; fi
             n=$((n+1))
             sleep 15
          done
          exit 1
